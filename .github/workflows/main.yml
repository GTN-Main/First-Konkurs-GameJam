name: Dispatch builds and tests
run-name: 🚀 ${{ github.event.commits[0].message || 'main.yml' }} — ${{ github.run_attempt }}. attempt triggered by @${{ github.triggering_actor }}.

on:
  workflow_dispatch:
  push:
    branches: ['main']
    tags: ['**']

jobs:
  checkIfShouldSkip:
    permissions:
      actions: write
      contents: read
    name: Check if should skip
    runs-on: ubuntu-slim
    outputs:
      should_skip: ${{ steps.skip_check.outputs.should_skip }}
    steps:
      - name: Skip duplicate actions
        uses: fkirc/skip-duplicate-actions@f75f66ce1886f00957d99748a42c724f4330bdcf
        id: skip_check
        with:
          cancel_others: true
          paths_ignore: '[".github/**", ".vscode/**", ".gitignore", "LICENSE", "README.md"]'
          do_not_skip: '["workflow_dispatch", "schedule", "merge_group"]'

  dispatchBuilds:
    permissions:
      contents: write
    needs: checkIfShouldSkip
    if: needs.checkIfShouldSkip.outputs.should_skip != 'true' || startsWith(github.ref, 'refs/tags/')
    name: Build
    strategy:
      fail-fast: false
      matrix:
        targetPlatform:
         - StandaloneWindows64
         - StandaloneLinux64
         - Android
    uses: GTN-Main/actions/.github/workflows/build.yml@main
    with:
      targetPlatform: ${{ matrix.targetPlatform }}
      webhookTitle: Nowa wersja nightly gry na GameJam!
      webhookMessage: GTN-Development bardzo ceni Wasze opinie, dlatego możecie przetestować grę [tutaj](${ARTIFACT_URL}). Build przeznaczony na `${TARGET_PLATFORM}`.\nNasz koniec jest <t:1776203940:R>.
    secrets: inherit

  dispatchRelease:
    needs: dispatchBuilds
    name: Release
    if: startsWith(github.ref, 'refs/tags/')
    uses: GTN-Main/actions/.github/workflows/send-release-webhook.yml@main
    with:
        webhookTitle: Nowa wersja gry na GameJam!
        webhookMessage: Wciąż nie mamy wybranej nazwy.
    secrets: inherit
